name: Bug Report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or repository link.
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Node, Express, Inertia client, adapter package versions.
    validations:
      required: true
